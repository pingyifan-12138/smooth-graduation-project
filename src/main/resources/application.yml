server:
  port: 8080

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stuclubmanagement?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 你的MySQL账号
    password: 12345
  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.manage.club.entity

# JWT 配置
jwt:
  secret: clubManage202406
  expire: 86400000

# 文件上传配置
upload:
  base-path: E:/uploads/
  access-path: /uploads/**      # 访问路径前缀
  logging:
    level:
      org.springframework.web: DEBUG
      org.springframework.web.servlet.mvc.method.annotation: DEBUG